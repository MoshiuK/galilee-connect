<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Galilee Bible">
    <meta name="theme-color" content="#103a7a">
    <title>Forgot Password — Galilee Bible Class</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-cross">✝</div>
                <h1>Forgot Password</h1>
                <p class="login-subtitle">Enter your email to reset your password</p>
            </div>

            <form id="forgotForm" onsubmit="return handleForgot(event)">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required class="form-input" placeholder="you@example.com">
                </div>
                <div id="forgotMsg" class="submit-message" style="display:none;"></div>
                <button type="submit" class="btn btn-primary btn-block" id="forgotBtn">Send Reset Link</button>
                <div style="text-align: center; margin-top: 1rem;">
                    <a href="/login" style="color: #d6e9ff; font-size: 0.9rem; text-decoration: none;">Back to Login</a>
                </div>
            </form>
        </div>
    </div>

    <script>
    // Register Service Worker
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('Service Worker registered'))
            .catch(err => console.log('Service Worker registration failed:', err));
    }

    async function handleForgot(e) {
        e.preventDefault();
        const btn = document.getElementById('forgotBtn');
        const msg = document.getElementById('forgotMsg');
        btn.disabled = true;
        btn.textContent = 'Sending...';
        msg.style.display = 'none';

        try {
            const resp = await fetch('/api/forgot-password', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    email: document.getElementById('email').value
                })
            });
            const data = await resp.json();
            msg.className = data.success ? 'submit-message success' : 'submit-message error';
            msg.textContent = data.message;
            msg.style.display = 'block';
            
            if (data.success) {
                document.getElementById('forgotForm').reset();
            }
        } catch(err) {
            msg.className = 'submit-message error';
            msg.textContent = 'Connection error. Please try again.';
            msg.style.display = 'block';
        }

        btn.disabled = false;
        btn.textContent = 'Send Reset Link';
        return false;
    }
    </script>
</body>
</html>
