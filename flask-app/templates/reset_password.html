<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Galilee Bible">
    <meta name="theme-color" content="#103a7a">
    <title>Reset Password — Galilee Bible Class</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-cross">✝</div>
                <h1>Reset Password</h1>
                <p class="login-subtitle">Enter your new password</p>
            </div>

            <form id="resetForm" onsubmit="return handleReset(event)">
                <div class="form-group">
                    <label for="password">New Password</label>
                    <input type="password" id="password" name="password" required minlength="8" class="form-input" placeholder="At least 8 characters">
                </div>
                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>
                    <input type="password" id="confirm_password" name="confirm_password" required minlength="8" class="form-input" placeholder="Re-enter password">
                </div>
                <div id="resetMsg" class="submit-message" style="display:none;"></div>
                <button type="submit" class="btn btn-primary btn-block" id="resetBtn">Reset Password</button>
                <div style="text-align: center; margin-top: 1rem;">
                    <a href="/login" style="color: #d6e9ff; font-size: 0.9rem; text-decoration: none;">Back to Login</a>
                </div>
            </form>
        </div>
    </div>

    <script>
    // Register Service Worker
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('Service Worker registered'))
            .catch(err => console.log('Service Worker registration failed:', err));
    }

    const token = window.location.pathname.split('/').pop();

    async function handleReset(e) {
        e.preventDefault();
        const btn = document.getElementById('resetBtn');
        const msg = document.getElementById('resetMsg');
        const password = document.getElementById('password').value;
        const confirm = document.getElementById('confirm_password').value;

        if (password !== confirm) {
            msg.className = 'submit-message error';
            msg.textContent = 'Passwords do not match';
            msg.style.display = 'block';
            return false;
        }

        btn.disabled = true;
        btn.textContent = 'Resetting...';
        msg.style.display = 'none';

        try {
            const resp = await fetch('/api/reset-password/' + token, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ password: password })
            });
            const data = await resp.json();
            msg.className = data.success ? 'submit-message success' : 'submit-message error';
            msg.textContent = data.message;
            msg.style.display = 'block';
            
            if (data.success) {
                setTimeout(() => {
                    window.location.href = '/login?reset=1';
                }, 2000);
            }
        } catch(err) {
            msg.className = 'submit-message error';
            msg.textContent = 'Connection error. Please try again.';
            msg.style.display = 'block';
        }

        btn.disabled = false;
        btn.textContent = 'Reset Password';
        return false;
    }
    </script>
</body>
</html>
